<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok</title>
    <!-- Font Awesome para iconos profesionales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2f 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo con efecto TikTok */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 80, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(37, 244, 238, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Título principal mejorado */
        .main-title-wrapper {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-shadow: 0 10px 20px rgba(255, 0, 80, 0.2);
            display: inline-block;
            position: relative;
        }

        .main-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #ff0050, #00f2ea);
            border-radius: 2px;
            animation: widthGrow 1s ease forwards;
        }

        @keyframes widthGrow {
            from { width: 0; }
            to { width: 100px; }
        }

        .title-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 10px;
        }

        .title-badge i {
            color: #ff0050;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Sección de video mejorada */
        .video-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 50px 40px;
            margin-bottom: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            animation: slideUp 0.8s ease 0.2s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(255, 0, 80, 0.2);
        }

        /* Encabezado de sección mejorado */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .section-header-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px rgba(255, 0, 80, 0.3);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .api-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a2f;
            position: relative;
            display: inline-block;
            margin: 0;
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Contenedor de video mejorado */
        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0 20px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 0, 80, 0.05), rgba(0, 242, 234, 0.05));
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Embed de TikTok mejorado */
        .tiktok-embed {
            margin: 0 auto !important;
            border-radius: 20px !important;
            overflow: hidden !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2) !important;
            transition: all 0.3s ease !important;
            border: 2px solid transparent !important;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #ff0050, #00f2ea) border-box !important;
        }

        .tiktok-embed:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 60px rgba(255, 0, 80, 0.3) !important;
        }

        /* Estadísticas del video */
        .video-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1a1a2f;
            font-weight: 500;
        }

        .stat-item i {
            font-size: 1.2rem;
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-number {
            font-weight: 700;
            color: #ff0050;
        }

        /* Navegación mejorada */
        .nav-section {
            text-align: center;
            margin-top: 40px;
            animation: fadeIn 1s ease 0.4s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .nav-button {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            color: white;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(255, 0, 80, 0.3);
            position: relative;
            overflow: hidden;
        }

        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 30px 60px rgba(255, 0, 80, 0.4);
        }

        .nav-button:hover::before {
            left: 100%;
        }

        .nav-button i {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .nav-button:hover i {
            transform: translateX(-5px);
        }

        /* Información adicional */
        .info-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            margin-top: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.8s ease 0.6s both;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #1a1a2f;
        }

        .info-item i {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-text {
            font-weight: 500;
        }

        .info-text small {
            display: block;
            color: #666;
            font-size: 0.85rem;
            margin-top: 3px;
        }

        /* Botón de regresar al inicio (nuevo) */
        .back-button-container {
            margin: 50px 0 20px;
            text-align: center;
            animation: fadeIn 1s ease 0.8s both;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #006341, #0a5a3a);
            color: white;
            text-decoration: none;
            padding: 16px 42px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0, 99, 65, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .back-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .back-button:hover {
            background: linear-gradient(135deg, #0a5a3a, #006341);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 99, 65, 0.4);
        }
        
        .back-button:hover::before {
            left: 100%;
        }
        
        .back-button i {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }
        
        .back-button:hover i {
            transform: translateX(-5px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
            }
            
            .api-title {
                font-size: 2rem;
            }
            
            .video-section {
                padding: 30px 20px;
            }
            
            .video-stats {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }
            
            .info-card {
                flex-direction: column;
                text-align: center;
            }
            
            .info-item {
                width: 100%;
                justify-content: center;
            }
            
            .section-header {
                flex-direction: column;
            }
            
            .back-button {
                padding: 14px 35px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2rem;
            }
            
            .api-title {
                font-size: 1.5rem;
            }
            
            .nav-button {
                padding: 15px 30px;
                font-size: 1rem;
            }
            
            .back-button {
                padding: 12px 30px;
                font-size: 0.95rem;
            }
        }

        /* Animaciones adicionales */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .section-header-icon {
            animation: float 3s ease infinite;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2f;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #00f2ea, #ff0050);
        }
    </style>
</head>
<body>

        <!-- BOTÓN REGRESAR AL INICIO (AGREGADO) -->
        <div class="back-button-container">

    </div>
    
    <!-- Script de TikTok -->
    <script async src="https://www.tiktok.com/embed.js"></script>
</body>
</html>
