<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Veterinaria</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ff0000;
}
.container{
    width:420px;
    background:#fff;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}
label{
    display:block;
    font-weight:bold;
    margin-top:10px;
}
input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}
textarea{
    resize:none;
}
input[type="submit"]{
    margin-top:20px;
    width:100%;
    padding:10px;
    background:#2c3e50;
    color:white;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>
<center>
<div class="container">
<h2>Registro de Mascota</h2>

<label>Nombre de la mascota</label>
<input type="text" required>

<label>Edad</label>
<input type="number" min="0" required>

<label>Especie</label>
<input type="text" required>

<label>Fecha de nacimiento</label>
<input type="date" required>

<label>Raza</label>
<input type="text" required>

<label>Peso (kg)</label>
<input type="number" step="0.1" required>

<label>Estatura (cm)</label>
<input type="number" required>

<label>Propietario</label>
<input type="text" required>

<label>Teléfono</label>
<input type="tel" required>

<label>Dirección</label>
<textarea rows="3" required></textarea>

<input type="submit" value="Registrar">
</div>
<a href="../index.html">Regresar</a><br>
</center>
</body>
</html>
