<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Zapatería</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}
.container{
    width:400px;
    background:#fff;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}
label{
    display:block;
    font-weight:bold;
    margin-top:10px;
}
input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}
input[type="submit"]{
    margin-top:20px;
    width:100%;
    padding:10px;
    background:#2c3e50;
    color:white;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>
<center>
<div class="container">
<h2>Registro de Zapatos</h2>

<label>Modelo</label>
<input type="text" required>

<label>Precio ($100 a $1000)</label>
<input type="number" min="100" max="1000" required>

<label>Color</label>
<select required>
    <option>Negro</option>
    <option>Café</option>
</select>

<label>Talla (desde 8, sin medios)</label>
<input type="number" min="8" step="1" required>

<input type="submit" value="Registrar">
</div>
<a href="../index.html">Regresar</a><br>
</center>
</body>
</html>
